name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm test --run --passWithNoTests

      - run: pnpm build

  pr-mac-build:
    needs: checks
    runs-on: macos-26
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - run: pnpm install

      - run: pnpm build:mac
