name: Release

on:
  workflow_dispatch:
    inputs:
      verbump:
        description: Version bump to apply before releasing
        required: true
        default: patch
        type: choice
        options:
          - none
          - major
          - minor
          - patch

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Require default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "workflow_dispatch must run from a branch ref." >&2
            exit 1
          fi

          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "workflow_dispatch releases are only allowed from ${DEFAULT_BRANCH}, not ${REF_NAME}." >&2
            exit 1
          fi

      - name: Bump package version
        if: ${{ inputs.verbump != 'none' }}
        run: npm version "${{ inputs.verbump }}" --no-git-tag-version

      - name: Resolve release version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Commit package version bump
        if: ${{ inputs.verbump != 'none' }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json

          if git diff --cached --quiet; then
            echo "package.json did not change after version bump." >&2
            exit 1
          fi

          git commit -m "release: v${VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Ensure release tag is new
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin

          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists." >&2
            exit 1
          fi

      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  build-mac:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-release
    runs-on: macos-26
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      # Code signing — electron-builder reads these automatically
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Notarization — electron-builder reads these automatically
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    outputs:
      asset_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:mac

      - name: Verify Electron fuses + OTA public key
        run: pnpm verify:fuses
        env:
          CI: 'true'
          KAI_RELEASE_BUILD: '1'

      - name: Verify update zip preserves framework symlinks
        run: |
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          if [ -z "$ZIP_PATH" ]; then
            echo "ERROR: No update zip found in dist/" >&2
            exit 1
          fi
          # Squirrel.Mac requires Electron's .framework bundles to keep their
          # Versions/Current → A symlinks. A 7za variant that follows symlinks
          # produces a zip that fails with "bundle format is ambiguous".
          if ! zipinfo "$ZIP_PATH" | grep -q '^l'; then
            echo "ERROR: $ZIP_PATH contains no symlink entries — auto-update will fail." >&2
            zipinfo "$ZIP_PATH" '*/Frameworks/Squirrel.framework/*' >&2 || true
            exit 1
          fi
          echo "✓ $(basename "$ZIP_PATH") has $(zipinfo "$ZIP_PATH" | grep -c '^l') symlink entries"

      - name: Verify Swift helper binary
        run: |
          APP_PATH="$(find dist/mac-universal -maxdepth 1 -name '*.app' -type d | head -n 1)"
          HELPER="$APP_PATH/Contents/Resources/bin/LocalMacosHelper"

          if [ ! -x "$HELPER" ]; then
            echo "ERROR: LocalMacosHelper binary not found or not executable at $HELPER" >&2
            exit 1
          fi

          echo "Helper binary: $(ls -la "$HELPER")"
          echo "Architectures: $(lipo -archs "$HELPER")"
          echo "Code signature:"
          codesign -dvv "$HELPER" 2>&1

          # Verify the helper can run and report permissions (basic smoke test)
          RESULT=$("$HELPER" permissions 2>&1)
          echo "Permissions check output: $RESULT"

          if ! echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ok') is True"; then
            echo "ERROR: LocalMacosHelper permissions check failed" >&2
            exit 1
          fi

          echo "✓ LocalMacosHelper binary verified"

      - name: Verify code signature
        run: |
          APP_PATH="$(find dist/mac-universal -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in dist/mac-universal/" >&2
            exit 1
          fi

          echo "Verifying signature: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "Checking notarization staple:"
          xcrun stapler validate "$APP_PATH" || echo "Warning: staple not found (notarization may still be processing)"

      - name: Locate DMG artifact
        id: artifact
        run: |
          artifact_path="$(find dist -maxdepth 1 -type f -name '*.dmg' | head -n 1)"

          if [ -z "$artifact_path" ]; then
            echo "No DMG artifact found in dist/." >&2
            exit 1
          fi

          # Strip version and arch for a stable download URL (e.g. Kai-1.0.10-universal.dmg -> Kai.dmg)
          name="$(basename "$artifact_path")"
          stable_name="$(echo "$name" | sed 's/-[0-9][0-9.]*-[a-z0-9]*\./\./')"
          stable_path="dist/${stable_name}"
          mv "$artifact_path" "$stable_path"

          echo "path=$stable_path" >> "$GITHUB_OUTPUT"
          echo "name=$stable_name" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kai-mac
          # DMG (stable-named) + the auto-update zip + its blockmap + the
          # latest-mac.yml manifest. The .zip.blockmap is REQUIRED for
          # electron-updater's differential (delta) download on macOS — without
          # it the updater always falls back to downloading the full zip.
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

      - name: Classify release for OTA eligibility
        id: ota-classify
        run: |
          node --import tsx scripts/classify-release.ts
          # Read the classification output
          OTA_ELIGIBLE=$(node -p "require('./dist/ota-classification.json').otaEligible")
          MIN_BASE_VERSION=$(node -p "require('./dist/ota-classification.json').minBaseVersion")
          echo "eligible=$OTA_ELIGIBLE" >> "$GITHUB_OUTPUT"
          echo "min_base_version=$MIN_BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "OTA eligible: $OTA_ELIGIBLE (min base: $MIN_BASE_VERSION)"

      - name: Build OTA archive
        if: steps.ota-classify.outputs.eligible == 'true'
        env:
          MIN_BASE_VERSION: ${{ steps.ota-classify.outputs.min_base_version }}
          KAI_OTA_SIGNING_KEY: ${{ secrets.KAI_OTA_SIGNING_KEY }}
        run: |
          # build-ota-archive.ts now reads MIN_BASE_VERSION and KAI_OTA_SIGNING_KEY
          # directly and writes a signed feed — the post-hoc node -e patch step
          # has been removed because mutating the feed after signing would
          # invalidate the Ed25519 signature.
          node --import tsx scripts/build-ota-archive.ts

      - name: Upload OTA artifacts
        if: steps.ota-classify.outputs.eligible == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kai-ota
          path: |
            dist/*-ota-*.tar.gz
            dist/latest-ota.json
          if-no-files-found: error
          retention-days: 1

  build-windows:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-release
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:win

      - name: Verify Windows artifacts present
        shell: bash
        run: |
          # Fail fast in the build job (not the finalize job) if outputs are missing.
          exe_path="$(find dist -maxdepth 1 -type f -name '*.exe' | head -n 1)"
          if [ -z "$exe_path" ]; then
            echo "ERROR: No .exe installer found in dist/" >&2
            exit 1
          fi
          manifest_path="$(find dist -maxdepth 1 -type f -name 'latest.yml' | head -n 1)"
          if [ -z "$manifest_path" ]; then
            echo "ERROR: No latest.yml manifest found in dist/" >&2
            exit 1
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kai-windows
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: error
          retention-days: 1

  build-linux:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:linux

      - name: Verify Linux artifacts present
        run: |
          # Fail fast in the build job (not the finalize job) if outputs are missing.
          appimage_path="$(find dist -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [ -z "$appimage_path" ]; then
            echo "ERROR: No .AppImage found in dist/" >&2
            exit 1
          fi
          deb_path="$(find dist -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          if [ -z "$deb_path" ]; then
            echo "ERROR: No .deb package found in dist/" >&2
            exit 1
          fi
          manifest_path="$(find dist -maxdepth 1 -type f -name 'latest-linux.yml' | head -n 1)"
          if [ -z "$manifest_path" ]; then
            echo "ERROR: No latest-linux.yml manifest found in dist/" >&2
            exit 1
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kai-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: error
          retention-days: 1

  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [prepare-release, build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: kai-mac
          path: ./dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: kai-windows
          path: ./dist/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: kai-linux
          path: ./dist/

      - name: Download OTA artifacts
        # OTA archive is only built when classify-release marks the release
        # OTA-eligible (JS-only changes); non-eligible releases ship a full app
        # update only, so this artifact may not exist.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: kai-ota
          path: ./dist/

      - name: Create GitHub release with all platform assets
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          # Collect every asset the platform build jobs produced. Each is
          # required except the OTA files (only present for eligible releases).
          assets=()
          for pat in '*.dmg' '*.zip' 'latest-mac.yml' '*.exe' 'latest.yml' '*.AppImage' '*.deb' 'latest-linux.yml'; do
            f="$(find dist -maxdepth 1 -type f -name "$pat" | head -n 1)"
            if [ -z "$f" ]; then
              echo "ERROR: expected release asset missing: $pat" >&2
              exit 1
            fi
            assets+=("$f")
          done
          # Blockmaps (attach ALL). electron-updater needs the .zip.blockmap next
          # to the update zip to do a differential (delta) download on macOS —
          # without it the client always downloads the full zip. Require at least
          # one so a delta-less release fails loudly instead of shipping silently.
          blockmaps=()
          while IFS= read -r f; do blockmaps+=("$f"); done < <(find dist -maxdepth 1 -type f -name '*.blockmap')
          if [ "${#blockmaps[@]}" -eq 0 ]; then
            echo "ERROR: no *.blockmap in dist/ — macOS differential updates would fall back to full downloads" >&2
            exit 1
          fi
          for f in "${blockmaps[@]}"; do
            assets+=("$f")
            echo "Including blockmap asset: $(basename "$f")"
          done
          # OTA (optional)
          for pat in '*-ota-*.tar.gz' 'latest-ota.json'; do
            f="$(find dist -maxdepth 1 -type f -name "$pat" | head -n 1)"
            if [ -n "$f" ]; then
              assets+=("$f")
              echo "Including OTA asset: $(basename "$f")"
            fi
          done

          gh release create "$TAG" "${assets[@]}" \
            --generate-notes \
            --title "$TAG" \
            --verify-tag

  update-cask:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - prepare-release
      - build-mac
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download DMG and compute SHA256
        id: sha
        env:
          ASSET_NAME: ${{ needs.build-mac.outputs.asset_name }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --pattern "$ASSET_NAME" \
            --repo "${{ github.repository }}" \
            --output kai.dmg
          sha=$(shasum -a 256 kai.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "asset_name_url=${ASSET_NAME// /%20}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        working-directory: homebrew-tap
        env:
          ASSET_NAME_URL: ${{ steps.sha.outputs.asset_name_url }}
          REPOSITORY: ${{ github.repository }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          mkdir -p Casks
          cat > Casks/kai.rb << RUBY
          cask "kai" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPOSITORY}/releases/download/v#{version}/${ASSET_NAME_URL}"
            name "Kai"
            desc "Kai desktop client"
            homepage "https://github.com/${REPOSITORY}"

            app "Kai.app"

            zap trash: "~/.kai"
          end
          RUBY

      - name: Commit and push cask update
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/kai.rb

          if git diff --cached --quiet; then
            echo "Cask formula is already up to date."
            exit 0
          fi

          git commit -m "update kai cask to ${VERSION}"
          git push
